version: '3.8'

services:

  db:
    image: postgres:15
    container_name: earthquakes_db
    environment:
      POSTGRES_DB: earthquakes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
    - pgdata:/var/lib/postgresql/data
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: earthquakes_app
    depends_on:
     - db
    environment:
      DB_HOST: db
      DB_NAME: earthquakes_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
    command: python -m src.pipeline

volumes:
  pgdata: